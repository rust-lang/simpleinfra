on:
  push:
    branches:
      - master
  pull_request:

jobs:
  rust:
    name: Rust projects
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust stable
        run: rustup update stable && rustup default stable && rustup component add clippy rustfmt

      - name: Run rustfmt
        run: cargo fmt --all -- --check

      - name: Run the test suite
        run: cargo test --all

      - name: Run clippy
        run: cargo clippy --all -- -Dwarnings

  static-crates-io:
    name: static.crates.io Fastly worker
    runs-on: ubuntu-24.04
    env:
      # renovate: datasource=crate depName=viceroy
      VICEROY_VERSION: "0.20.0"
      # renovate: datasource=crate depName=cargo-nextest
      NEXTEST_VERSION: "0.9.140"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          env-vars: VICEROY_VERSION NEXTEST_VERSION
          workspaces: terragrunt/modules/crates-io/compute-static

      - name: Install test tools
        run: |
          cargo install viceroy --locked --version "$VICEROY_VERSION"
          cargo install cargo-nextest --locked --version "$NEXTEST_VERSION"

      - name: Run the test suite
        working-directory: terragrunt/modules/crates-io/compute-static
        run: cargo nextest run

  terraform:
    name: Terraform configuration
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install terraform cli
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Ensure the terraform files are formatted correctly
        run: terraform fmt -check -diff -recursive

  actions-js:
    name: GitHub Actions (JS)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 16
      - name: Ensure the bundled action is the same as the source code
        run: |
          for action in $(ls github-actions/); do
            if [[ -f "github-actions/${action}/package.json" ]]; then
              pushd "github-actions/${action}"
              sha256sum dist/* > "/tmp/sha256-${action}-before"
              npm install
              npm run build
              sha256sum dist/* > "/tmp/sha256-${action}-after"
              diff -u --color "/tmp/sha256-${action}-before" "/tmp/sha256-${action}-after"
              popd
            fi
          done

  javascript-tests:
    name: JavaScript Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Run tests
        run: |
          node --test terragrunt/modules/release-distribution/lambdas/doc-router/test.mjs

  # Summary job for the merge queue.
  # ALL THE PREVIOUS JOBS NEED TO BE ADDED TO THE `needs` SECTION OF THIS JOB!
  CI:
    # Keep `name` matching the status check.
    name: CI
    needs: [ terraform, actions-js, javascript-tests, rust, static-crates-io]
    # We need to ensure this job does *not* get skipped if its dependencies fail,
    # because a skipped job is considered a success by GitHub. So we have to
    # overwrite `if:`. We use `!cancelled()` to ensure the job does still not get run
    # when the workflow is canceled manually.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    steps:
      # Manually check the status of all dependencies. `if: failure()` does not work.
      - name: Conclusion
        env:
          NEEDS: ${{ toJson(needs) }}
        run: |
          # Print the dependent jobs to see them in the CI log
          jq -C <<< "$NEEDS"
          # Check if all jobs that we depend on (in the needs array) were successful.
          jq --exit-status 'all(.result == "success" or .result == "skipped")' <<< "$NEEDS"
